# DPDCA Sprint Agent Workflow
# Trigger: GitHub Issue labeled "agent-task"
# Model:   gpt-4o-mini via GitHub Models API (GITHUB_TOKEN auto-provided)
# D1 -- Discover  (parse issue, read specs, load context)
# P  -- Plan      (LLM generates numbered implementation plan)
# D2 -- Do        (scaffold files, write evidence receipt)
# C  -- Check     (ruff lint + pytest --co)
# A  -- Act       (commit, push, open PR, comment on issue)
#
# Required secrets: GITHUB_TOKEN (auto), AZURE_OPENAI_ENDPOINT (optional),
#                   AZURE_OPENAI_KEY (optional)

name: DPDCA Sprint Agent

on:
  issues:
    types: [labeled]
  workflow_dispatch:
    inputs:
      issue_number:
        description: Issue number to process
        required: true
        type: number

jobs:
  dpdca:
    name: "DPDCA"
    if: >-
      github.event_name == 'workflow_dispatch' ||
      contains(github.event.issue.labels.*.name, 'agent-task')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write

    steps:
      - name: D1 -- Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: D1 -- Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: D1 -- Install CI dependencies
        run: |
          pip install --quiet ruff pytest pytest-asyncio httpx 2>/dev/null || true
          pip install -r services/api/requirements.txt --quiet 2>/dev/null || true

      - name: D1 -- Parse issue body into environment
        id: parse
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            ISSUE_NUM="${{ inputs.issue_number }}"
          else
            ISSUE_NUM="${{ github.event.issue.number }}"
          fi
          echo "ISSUE_NUM=$ISSUE_NUM" >> "$GITHUB_ENV"
          BODY=$(gh issue view "$ISSUE_NUM" --json body -q .body --repo "${{ github.repository }}")
          TITLE=$(gh issue view "$ISSUE_NUM" --json title -q .title --repo "${{ github.repository }}")
          echo "ISSUE_TITLE=$TITLE" >> "$GITHUB_ENV"
          STORY_ID=$(printf '%s' "$BODY" | grep -oP 'ACA-\d{2}-\d{3}' | head -1 || echo "UNKNOWN")
          WBS_ID=$(printf '%s' "$BODY" | grep -oP '\d+\.\d+\.\d+' | head -1 || echo "UNKNOWN")
          EPIC=$(printf '%s' "$BODY" | grep -oP 'Epic \d+ -- [^\n]+' | head -1 || echo "UNKNOWN")
          echo "STORY_ID=${STORY_ID}" >> "$GITHUB_ENV"
          echo "WBS_ID=${WBS_ID}" >> "$GITHUB_ENV"
          echo "EPIC=${EPIC}" >> "$GITHUB_ENV"
          BRANCH_SLUG=$(echo "${STORY_ID}" | tr '[:upper:]' '[:lower:]' | tr ' ' '-')
          echo "BRANCH_NAME=agent/${BRANCH_SLUG}-$(date +%Y%m%d%H%M%S)" >> "$GITHUB_ENV"
          echo "[INFO] Story=$STORY_ID  WBS=$WBS_ID"

      - name: D1 -- Load project context files
        run: |
          printf '=== CONTEXT SUMMARY ===\n' > agent-context.txt
          printf 'Story: %s  WBS: %s\n\n' "$STORY_ID" "$WBS_ID" >> agent-context.txt
          printf '=== PLAN.md ===\n' >> agent-context.txt
          cat PLAN.md >> agent-context.txt
          printf '\n=== STATUS DECISIONS ===\n' >> agent-context.txt
          grep -A 2 "DECISIONS LOCKED" STATUS.md | head -80 >> agent-context.txt || true
          printf '\n=== COPILOT INSTRUCTIONS (excerpt) ===\n' >> agent-context.txt
          head -200 .github/copilot-instructions.md >> agent-context.txt || true
          echo "[INFO] Context size: $(wc -c < agent-context.txt) bytes"

      - name: P -- Generate implementation plan via LLM
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          AZURE_OPENAI_ENDPOINT: ${{ secrets.AZURE_OPENAI_ENDPOINT }}
          AZURE_OPENAI_KEY: ${{ secrets.AZURE_OPENAI_KEY }}
          AZURE_OPENAI_DEPLOYMENT: "${{ vars.AZURE_OPENAI_DEPLOYMENT }}"
        run: |
          export ISSUE_BODY
          ISSUE_BODY=$(gh issue view "$ISSUE_NUM" --json body -q .body \
            --repo "${{ github.repository }}")
          python3 .github/scripts/dpdca_plan.py

      - name: D2 -- Create feature branch
        run: |
          git config user.name "ACA DPDCA Agent"
          git config user.email "agent@eva-foundry.dev"
          git checkout -b "$BRANCH_NAME"

      - name: D2 -- Write evidence receipt and copy plan
        run: python3 .github/scripts/dpdca_evidence.py write

      - name: C -- Ruff lint
        continue-on-error: true
        run: |
          ruff check services/ --quiet 2>&1 | tee lint-result.txt
          LINT_EXIT=${PIPESTATUS[0]}
          echo "LINT_STATUS=$LINT_EXIT" >> "$GITHUB_ENV"
          [ "$LINT_EXIT" = "0" ] && echo "[PASS] lint clean" || echo "[WARN] lint issues"

      - name: C -- Pytest collect
        continue-on-error: true
        run: |
          pytest services/ --co -q 2>&1 | tee test-collect.txt
          TEST_EXIT=${PIPESTATUS[0]}
          echo "TEST_STATUS=$TEST_EXIT" >> "$GITHUB_ENV"
          [ "$TEST_EXIT" = "0" ] && echo "[PASS] tests clean" || echo "[WARN] test issues"

      - name: C -- Update evidence receipt with check results
        run: python3 .github/scripts/dpdca_evidence.py update

      - name: A -- Commit scaffolded work
        run: |
          git status --short
          git add .eva/ agent-plan.md lint-result.txt test-collect.txt 2>&1 || true
          git status --short
          MSG="${STORY_ID} agent: scaffold + evidence receipt -- issue #${ISSUE_NUM}"
          git diff --cached --quiet && echo "[INFO] Nothing to commit" || \
          git commit -m "$MSG"

      - name: A -- Push branch
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git push origin "$BRANCH_NAME" 2>&1 || echo "[WARN] Push failed"

      - name: A -- Open Pull Request
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 .github/scripts/gen_pr_body.py > /tmp/pr-body.md
          gh pr create \
            --repo "${{ github.repository }}" \
            --title "${STORY_ID}: ${ISSUE_TITLE}" \
            --body-file /tmp/pr-body.md \
            --base main \
            --head "$BRANCH_NAME" \
            --label "agent-task" 2>&1 || echo "[WARN] PR creation failed"

      - name: A -- Comment on issue
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_URL=$(gh pr list --repo "${{ github.repository }}" \
            --head "$BRANCH_NAME" --json url -q '.[0].url' 2>/dev/null || echo "")
          COMMENT="DPDCA Agent Complete -- Story: ${STORY_ID} -- Branch: ${BRANCH_NAME}"
          [ -n "$PR_URL" ] && COMMENT="$COMMENT -- PR: $PR_URL"
          COMMENT="$COMMENT -- Next: review plan, run pytest locally, merge when checklist complete."
          gh issue comment "$ISSUE_NUM" \
            --repo "${{ github.repository }}" \
            --body "$COMMENT" 2>&1 || echo "[WARN] Comment failed"

      - name: A -- Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: "dpdca-${{ env.STORY_ID }}-artifacts"
          path: |
            agent-plan.md
            agent-context.txt
            lint-result.txt
            test-collect.txt
            .eva/evidence/
          retention-days: 30
