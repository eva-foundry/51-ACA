name: CI

on:
  pull_request:
  push:
    branches: [main, develop]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install all service deps
        run: |
          pip install ruff mypy pytest
          pip install -r services/api/requirements.txt
          pip install -r services/collector/requirements.txt
          pip install -r services/analysis/requirements.txt
          pip install -r services/delivery/requirements.txt

      - name: Ruff lint
        run: ruff check services/

      - name: mypy type-check
        run: mypy services/ --ignore-missing-imports --no-error-summary

      - name: pytest
        run: pytest services/ -x -q --tb=short
