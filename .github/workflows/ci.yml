# EVA-STORY: ACA-01-006
name: CI

on:
  pull_request:
  push:
    branches: [main, develop]

jobs:
  # -------------------------------------------------------------------------
  # Backend: lint + type check + unit tests
  # -------------------------------------------------------------------------
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install all service deps
        run: |
          pip install ruff mypy pytest pytest-cov
          pip install -r services/api/requirements.txt
          pip install -r services/collector/requirements.txt
          pip install -r services/analysis/requirements.txt
          pip install -r services/delivery/requirements.txt

      - name: Ruff lint
        run: ruff check services/

      - name: mypy type-check
        run: mypy services/ --ignore-missing-imports --no-error-summary

      - name: pytest with coverage
        env:
          PYTHONPATH: services/api
        run: pytest services/analysis/app/rules --cov=services/analysis/app/rules --cov-report=term --cov-fail-under=95 -v --tb=short

      - name: pytest full suite
        env:
          PYTHONPATH: services/api
        run: pytest services/ -x -q --tb=short

  # -------------------------------------------------------------------------
  # Frontend: install + typecheck + build
  # -------------------------------------------------------------------------
  frontend-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install deps
        run: npm ci

      - name: Lint (i18n enforcement)
        run: npm run lint

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build

  # -------------------------------------------------------------------------
  # Agent pre-flight: verify AGENTS.md exists and on-create.sh is executable
  # -------------------------------------------------------------------------
  agent-preflight:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: AGENTS.md present
        run: test -f AGENTS.md && echo "[PASS] AGENTS.md found"

      - name: devcontainer config present
        run: test -f .devcontainer/devcontainer.json && echo "[PASS] devcontainer.json found"

      - name: on-create smoke
        run: |
          chmod +x .devcontainer/on-create.sh
          bash -n .devcontainer/on-create.sh && echo "[PASS] on-create.sh syntax OK"
