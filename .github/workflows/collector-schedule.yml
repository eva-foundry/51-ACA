# EVA-STORY: ACA-01-018
name: Collector -- Scheduled Scan

on:
  schedule:
    - cron: "0 2 * * *"  # daily at 02:00 UTC
  workflow_dispatch:
    inputs:
      subscription_id:
        description: "Azure subscription ID to collect"
        required: false
      scan_id:
        description: "Scan ID (leave blank to auto-generate)"
        required: false

permissions:
  id-token: write
  contents: read

env:
  AZURE_CLIENT_ID_VALUE: ${{ secrets.AZURE_CLIENT_ID_PHASE1 || secrets.AZURE_CLIENT_ID }}
  AZURE_TENANT_ID_VALUE: ${{ secrets.AZURE_TENANT_ID }}
  AZURE_SUBSCRIPTION_ID_VALUE: ${{ secrets.AZURE_SUBSCRIPTION_ID_PHASE1 || secrets.AZURE_SUBSCRIPTION_ID }}
  DEFAULT_SUBSCRIPTION_ID_VALUE: ${{ secrets.DEFAULT_SUBSCRIPTION_ID || secrets.AZURE_SUBSCRIPTION_ID_PHASE1 || secrets.AZURE_SUBSCRIPTION_ID }}
  COLLECTOR_RESOURCE_GROUP: EsDAICoE-Sandbox
  COLLECTOR_JOB_NAME: aca-51-collector

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Pre-flight checks
        shell: bash
        run: |
          if [ -z "$AZURE_CLIENT_ID_VALUE" ] || [ -z "$AZURE_TENANT_ID_VALUE" ] || [ -z "$AZURE_SUBSCRIPTION_ID_VALUE" ]; then
            echo "[ERROR] Missing Azure OIDC secrets for collector schedule"
            exit 1
          fi

          TARGET_SUBSCRIPTION="${{ github.event.inputs.subscription_id }}"
          if [ -z "$TARGET_SUBSCRIPTION" ]; then
            TARGET_SUBSCRIPTION="$DEFAULT_SUBSCRIPTION_ID_VALUE"
          fi

          if [ -z "$TARGET_SUBSCRIPTION" ]; then
            echo "[ERROR] No target subscription ID provided and no default subscription secret configured"
            exit 1
          fi

          echo "TARGET_SUBSCRIPTION=$TARGET_SUBSCRIPTION" >> "$GITHUB_ENV"

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ env.AZURE_CLIENT_ID_VALUE }}
          tenant-id: ${{ env.AZURE_TENANT_ID_VALUE }}
          subscription-id: ${{ env.AZURE_SUBSCRIPTION_ID_VALUE }}

      - name: Install Azure Container Apps extension
        run: |
          az extension add --name containerapp --upgrade -y

      - name: Trigger collector Container App Job
        run: |
          SCAN_ID="${{ github.event.inputs.scan_id }}"
          if [ -z "$SCAN_ID" ]; then
            SCAN_ID="sched-$(date +%Y%m%d-%H%M%S)"
          fi
          az containerapp job start \
            --name "$COLLECTOR_JOB_NAME" \
            --resource-group "$COLLECTOR_RESOURCE_GROUP" \
            --args "--scan-id" "$SCAN_ID" \
                   "--subscription-id" "$TARGET_SUBSCRIPTION"

      - name: Summarize collector launch
        if: always()
        shell: bash
        run: |
          echo "## Collector Schedule" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- Job: $COLLECTOR_JOB_NAME" >> "$GITHUB_STEP_SUMMARY"
          echo "- Resource Group: $COLLECTOR_RESOURCE_GROUP" >> "$GITHUB_STEP_SUMMARY"
          echo "- Target Subscription: $TARGET_SUBSCRIPTION" >> "$GITHUB_STEP_SUMMARY"
