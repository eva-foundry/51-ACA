name: Collector -- Scheduled Scan

on:
  schedule:
    - cron: "0 2 * * *"  # daily at 02:00 UTC
  workflow_dispatch:
    inputs:
      subscription_id:
        description: "Azure subscription ID to collect"
        required: true
      scan_id:
        description: "Scan ID (leave blank to auto-generate)"
        required: false

permissions:
  id-token: write
  contents: read

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID_PHASE1 }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID_PHASE1 }}

      - name: Trigger collector Container App Job
        run: |
          SCAN_ID="${{ github.event.inputs.scan_id }}"
          if [ -z "$SCAN_ID" ]; then
            SCAN_ID="sched-$(date +%Y%m%d-%H%M%S)"
          fi
          az containerapp job start \
            --name aca-51-collector \
            --resource-group EsDAICoE-Sandbox \
            --args "--scan-id" "$SCAN_ID" \
                   "--subscription-id" "${{ github.event.inputs.subscription_id || secrets.DEFAULT_SUBSCRIPTION_ID }}"
