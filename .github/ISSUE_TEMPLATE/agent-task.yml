name: Sprint Backlog Item (DPDCA)
description: >-
  A well-scoped sprint story submitted for the DPDCA cloud agent.
  Fill every field -- the agent uses these as its complete work order.
  Trigger: add label "agent-task" after creating the issue.
title: "[STORY-ID] <story title>"
labels: []
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        ## DPDCA Work Order
        Complete all sections. The agent reads this issue verbatim -- precision = quality.
        After creating, add label **agent-task** to trigger the workflow.

  - type: input
    id: story_id
    attributes:
      label: Story ID
      description: Numeric Veritas story ID (format ACA-NN-NNN).
      placeholder: "ACA-04-001"
    validations:
      required: true

  - type: input
    id: wbs_id
    attributes:
      label: WBS ID
      description: Work Breakdown Structure node (format N.N.N).
      placeholder: "4.1.1"
    validations:
      required: true

  - type: dropdown
    id: epic
    attributes:
      label: Epic
      options:
        - "Epic 1 -- Foundation and Infrastructure"
        - "Epic 2 -- Data Collection Pipeline"
        - "Epic 3 -- Analysis Engine and Rules"
        - "Epic 4 -- API and Auth Layer"
        - "Epic 5 -- Frontend Core"
        - "Epic 6 -- Monetization and Billing"
        - "Epic 7 -- Delivery Packager"
        - "Epic 8 -- Azure Best Practices Integration"
        - "Epic 9 -- i18n and a11y"
        - "Epic 10 -- DPDCA Cloud Agent"
        - "Epic 11 -- Phase 2 Infrastructure"
    validations:
      required: true

  - type: dropdown
    id: fp_size
    attributes:
      label: Function Point Size
      description: IFPUG simplified estimate for effort and velocity tracking.
      options:
        - "XS (1 FP) -- config change or trivial stub"
        - "S (3 FP) -- single route or component, no new schema"
        - "M (5 FP) -- one feature with tests, touches 2-3 files"
        - "L (9 FP) -- cross-service feature, new schema, full tests"
        - "XL (20 FP) -- significant integration, multiple services"
    validations:
      required: true

  - type: input
    id: sprint
    attributes:
      label: Sprint
      description: Sprint number this item belongs to.
      placeholder: "3"
    validations:
      required: true

  - type: textarea
    id: user_story
    attributes:
      label: User story
      description: "As a <persona>, I want <action>, so that <value>."
      placeholder: |
        As an ACA API consumer, I want the /connect endpoint to accept any
        Microsoft tenant (authority=common), so that private-sector customers
        can connect without being tied to the EsDAICoE org.
    validations:
      required: true

  - type: textarea
    id: inputs
    attributes:
      label: Inputs
      description: What files, APIs, data, or secrets this story consumes.
      placeholder: |
        - services/api/app/routers/auth.py (current auth stubs)
        - .env: ACA_CLIENT_ID, ACA_TENANT_ID (becomes common)
        - MSAL PublicClientApplication + device code flow
        - Cosmos container: clients (partition_key=subscriptionId)
    validations:
      required: true

  - type: textarea
    id: outputs
    attributes:
      label: Outputs
      description: What files are changed/created, what APIs return.
      placeholder: |
        - services/api/app/routers/auth.py -- updated connect() function
        - services/api/app/middleware/tenant.py -- updated authority= line
        - services/api/tests/test_auth.py -- added multi-tenant test
        - POST /v1/connect returns 200 { subscriptionId, tier, token } for any tenant
    validations:
      required: true

  - type: textarea
    id: acceptance_criteria
    attributes:
      label: Acceptance criteria
      description: Each item must be verifiable by pytest or an assertion. Check boxes.
      value: |
        - [ ] POST /v1/connect with authority=common returns 200
        - [ ] connection_token stored in Cosmos with partition_key=subscriptionId
        - [ ] tenant_id from decoded token matches subscriptionId scope
        - [ ] pytest services/ -x -q exits 0
        - [ ] ruff check services/ exits 0
        - [ ] EVA-STORY tag present with real ID (example: # EVA-STORY: ACA-04-011)
    validations:
      required: true

  - type: textarea
    id: spec_refs
    attributes:
      label: Spec references
      description: Spec docs the agent must read before implementing.
      placeholder: |
        - docs/02-preflight.md -- MSAL delegated auth pattern
        - docs/05-technical.md -- API spec section 3
        - .github/copilot-instructions.md -- Section P2.5 Pattern 3
    validations:
      required: false

  - type: textarea
    id: files_to_modify
    attributes:
      label: Files to modify or create
      description: Explicit list. One per line. Relative to repo root.
      placeholder: |
        services/api/app/routers/auth.py
        services/api/app/middleware/tenant.py
        services/api/tests/test_auth.py
    validations:
      required: true

  - type: textarea
    id: constraints
    attributes:
      label: Constraints and patterns
      description: Rules the agent MUST follow. Non-negotiable.
      value: |
        - ASCII-only. No Unicode, no emoji in any file.
        - Every Cosmos query must include partition_key=subscriptionId.
        - Tier 1 responses must pass through gate_findings() -- never return full findings.
        - MSAL authority must be https://login.microsoftonline.com/common (multi-tenant).
        - No .env or secrets committed. Use settings.py + Key Vault references.
        - All new functions must have type hints. mypy must remain clean.
    validations:
      required: false

  - type: textarea
    id: depends_on
    attributes:
      label: Depends on (story IDs)
      description: Stories that must be complete before this one starts.
      placeholder: "ACA-12-001, ACA-12-002"
    validations:
      required: false

  - type: checkboxes
    id: agent_preflight
    attributes:
      label: Agent pre-flight checklist
      description: The agent confirms all of these before opening a PR.
      options:
        - label: "pytest services/ --co -q exits 0 (collect phase)"
          required: true
        - label: "ruff check services/ exits 0"
          required: true
        - label: "No .env or secrets committed"
          required: true
        - label: "All Cosmos queries include partition_key"
          required: true
        - label: "No Unicode or emoji in any file"
          required: true
        - label: "EVA-STORY tag added to all new/modified source files"
          required: true
        - label: "Evidence receipt written to .eva/evidence/"
          required: true
